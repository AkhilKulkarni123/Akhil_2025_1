<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titanic Survival Predictor</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        form { max-width: 400px; margin: auto; }
        label { display: block; margin-top: 10px; }
        input, select { width: 100%; padding: 8px; margin-top: 5px; }
        button { margin-top: 20px; padding: 10px; width: 100%; background-color: #4CAF50; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #45a049; }
        #result { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Titanic Survival Predictor</h1>
    <p>Enter your passenger details to predict your survival probability on the Titanic.</p>
    <form id="passengerForm">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>

        <label for="pclass">Passenger Class (1, 2, or 3):</label>
        <select id="pclass" name="pclass" required>
            <option value="1">1st Class</option>
            <option value="2">2nd Class</option>
            <option value="3">3rd Class</option>
        </select>

        <label for="sex">Sex:</label>
        <select id="sex" name="sex" required>
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>

        <label for="age">Age:</label>
        <input type="number" id="age" name="age" min="0" max="120" required>

        <label for="sibsp">Number of Siblings/Spouses Aboard:</label>
        <input type="number" id="sibsp" name="sibsp" min="0" required>

        <label for="parch">Number of Parents/Children Aboard:</label>
        <input type="number" id="parch" name="parch" min="0" required>

        <label for="fare">Fare:</label>
        <input type="number" id="fare" name="fare" min="0" step="0.01" required>

        <label for="embarked">Port of Embarkation:</label>
        <select id="embarked" name="embarked" required>
            <option value="C">Cherbourg</option>
            <option value="Q">Queenstown</option>
            <option value="S">Southampton</option>
        </select>

        <label for="alone">Alone:</label>
        <select id="alone" name="alone" required>
            <option value="false">No</option>
            <option value="true">Yes</option>
        </select>

        <button type="submit">Predict Survival</button>
    </form>
    <div id="result"></div>
    <button id="finalButton" style="display:none;">Will I Survive?</button>
    <div id="finalResult"></div>

    <script>
        document.getElementById('passengerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const passenger = {
                name: [formData.get('name')],
                pclass: [parseInt(formData.get('pclass'))],
                sex: [formData.get('sex')],
                age: [parseFloat(formData.get('age'))],
                sibsp: [parseInt(formData.get('sibsp'))],
                parch: [parseInt(formData.get('parch'))],
                fare: [parseFloat(formData.get('fare'))],
                embarked: [formData.get('embarked')],
                alone: [formData.get('alone') === 'true']
            };

            fetch('/api/titanic/predict', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(passenger),
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('result').innerHTML = `
                    Death Probability: ${(data.die * 100).toFixed(2)}%<br>
                    Survival Probability: ${(data.survive * 100).toFixed(2)}%
                `;
                document.getElementById('finalButton').style.display = 'block';
                document.getElementById('finalButton').onclick = function() {
                    document.getElementById('finalResult').innerHTML = `Final Survival Chance: ${(data.survive * 100).toFixed(2)}%`;
                };
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('result').innerHTML = 'An error occurred. Please try again.';
            });
        });
    </script>
</body>
</html>
