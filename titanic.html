<div style="background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%); padding: 30px; border-radius: 10px; margin: 20px 0; color: white; font-family: 'Trebuchet MS', sans-serif;">
  <h3 style="margin-top: 0; color: white; text-align: center; font-size: 2em;">⛵ Titanic Survival Predictor</h3>
  <p style="text-align: center; font-size: 1.1em; margin-bottom: 20px;">Enter your details to discover your survival chances aboard the Titanic</p>
  
  <form id="survivalForm" style="background: rgba(255,255,255,0.95); padding: 25px; border-radius: 8px; color: #333; max-width: 600px; margin: 0 auto;">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">

      <div>
        <label style="font-weight: bold; display: block; margin-bottom: 5px;">⚧ Gender</label>
        <select id="sex" name="sex" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
          <option value="male" selected>Male</option>
          <option value="female">Female</option>
        </select>
      </div>

      <div>
        <label style="font-weight: bold; display: block; margin-bottom: 5px;">🎂 Age</label>
        <input type="number" id="age" name="age" value="65" min="0" max="120" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
      </div>

      <div>
        <label style="font-weight: bold; display: block; margin-bottom: 5px;">👨‍👩 Siblings/Spouses</label>

      </div>

      <div>
        <label style="font-weight: bold; display: block; margin-bottom: 5px;">👶 Parents/Children</label>
        <input type="number" id="parch" name="parch" value="1" min="0" max="6" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
      </div>

      <div>
        <label style="font-weight: bold; display: block; margin-bottom: 5px;">💰 Fare ($)</label>
        <input type="number" id="fare" name="fare" value="16" min="0" step="0.01" max="512" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
      </div>

      <div>
        <label style="font-weight: bold; display: block; margin-bottom: 5px;">🏴 Port of Embarkation</label>
        <select id="embarked" name="embarked" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
          <option value="C">Cherbourg (C)</option>
          <option value="Q">Queenstown (Q)</option>
          <option value="S" selected>Southampton (S)</option>
        </select>
      </div>

      <div style="grid-column: span 2;">
        <label style="font-weight: bold; display: block; margin-bottom: 5px;">🧑‍🤝‍🧑 Traveling Alone?</label>
        <select id="alone" name="alone" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">

    </div>

    <button type="submit" style="width: 100%; padding: 12px; background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%); color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.02)'" onmouseout="this.style.transform='scale(1)'">🔮 Predict My Fate</button>
  </form>

  <div id="resultContainer" style="display: none; margin-top: 20px; background: rgba(255,255,255,0.95); padding: 25px; border-radius: 8px; color: #333; max-width: 600px; margin: 20px auto 0;">
    <h4 style="margin-top: 0; border-bottom: 3px solid #e74c3c; padding-bottom: 10px; text-align: center;">📊 Your Survival Prediction</h4>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
      <div style="background: rgba(231, 76, 60, 0.1); padding: 15px; border-radius: 8px; border-left: 4px solid #e74c3c;">
        <div style="font-size: 14px; color: #666; margin-bottom: 5px;">☠️ Death Probability</div>
        <div id="deathProb" style="font-size: 28px; font-weight: bold; color: #e74c3c;">--</div>
      </div>
      
      <div style="background: rgba(46, 204, 113, 0.1); padding: 15px; border-radius: 8px; border-left: 4px solid #2ecc71;">
        <div style="font-size: 14px; color: #666; margin-bottom: 5px;">⛵ Survival Probability</div>
        <div id="surviveProb" style="font-size: 28px; font-weight: bold; color: #2ecc71;">--</div>
      </div>
    </div>

    <div style="background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 15px;">
      <p id="predictionMessage" style="margin: 0; font-size: 16px; line-height: 1.6; color: #333;"></p>
    </div>
  </div>

  <div id="loadingSpinner" style="display: none; text-align: center; color: white; font-weight: bold; margin-top: 15px;">
    <p>🔄 Calculating your prediction...</p>
  </div>
</div>

<script>
// Model coefficients and intercept from the trained LogisticRegression model
const coef = [-1.13981942, -2.43769163, -0.0420312686, -0.517711367, -0.158348082, 0.00194788449, -0.593062428, -0.196432509, 0.25185226, -0.0370913017];
const intercept = 5.46981168;

// Features order: ['pclass', 'sex', 'age', 'sibsp', 'parch', 'fare', 'alone', 'embarked_C', 'embarked_Q', 'embarked_S']

function sigmoid(x) {
  return 1 / (1 + Math.exp(-x));
}

function predictSurvival(passenger) {
  // Preprocess
  const sex = passenger.sex === 'male' ? 1 : 0;
  const alone = passenger.alone === 'true' ? 1 : 0;
  const embarked_C = passenger.embarked === 'C' ? 1 : 0;
  const embarked_Q = passenger.embarked === 'Q' ? 1 : 0;
  const embarked_S = passenger.embarked === 'S' ? 1 : 0;
  
  const X = [
    parseFloat(passenger.pclass),
    sex,
    parseFloat(passenger.age),
    parseFloat(passenger.sibsp),
    parseFloat(passenger.parch),
    parseFloat(passenger.fare),
    alone,
    embarked_C,
    embarked_Q,
    embarked_S
  ];
  
  // Compute logit
  let logit = intercept;
  for (let i = 0; i < coef.length; i++) {
    logit += X[i] * coef[i];
  }
  
  // Probabilities: positive class is survival (1)
  const prob_survive = sigmoid(logit);
  const prob_die = 1 - prob_survive;
  
  return { die: prob_die, survive: prob_survive };
}

document.getElementById('survivalForm').addEventListener('submit', function(e) {
  e.preventDefault();
  
  const form = document.getElementById('survivalForm');
  const resultContainer = document.getElementById('resultContainer');
  const loadingSpinner = document.getElementById('loadingSpinner');
  
  // Show loading
  loadingSpinner.style.display = 'block';
  resultContainer.style.display = 'none';
  
  const passenger = {
    name: document.getElementById('name').value,
    pclass: document.getElementById('pclass').value,
    sex: document.getElementById('sex').value,
    age: document.getElementById('age').value,
    sibsp: document.getElementById('sibsp').value,
    parch: document.getElementById('parch').value,
    fare: document.getElementById('fare').value,
    embarked: document.getElementById('embarked').value,
    alone: document.getElementById('alone').value
  };
  
  // Compute prediction locally
  const data = predictSurvival(passenger);
  displayResults(data);
  
  loadingSpinner.style.display = 'none';
});

function displayResults(data) {
  const resultContainer = document.getElementById('resultContainer');
  const deathProb = (data.die * 100).toFixed(2);
  const surviveProb = (data.survive * 100).toFixed(2);
  
  document.getElementById('deathProb').textContent = deathProb + '%';
  document.getElementById('surviveProb').textContent = surviveProb + '%';
  
  // Generate message
  let message = '';
  if (surviveProb > 70) {
    message = `<strong style="color: #2ecc71;">🎉 Hope floats!</strong> Based on historical Titanic data, passengers with your profile had approximately a <strong style="color: #2ecc71;">${surviveProb}%</strong> chance of survival. Your attributes suggest a higher likelihood of survival compared to the average passenger.`;
  } else if (surviveProb > 50) {
    message = `<strong style="color: #f39c12;">⚓ Fair winds:</strong> Your survival probability is estimated at <strong style="color: #f39c12;">${surviveProb}%</strong>. This is slightly above average, suggesting a fair chance of survival.`;
  } else if (surviveProb > 30) {
    message = `<strong style="color: #e67e22;">⚠️ Rough seas ahead:</strong> Your estimated survival probability is <strong style="color: #e67e22;">${surviveProb}%</strong>. This suggests below-average survival chances based on your passenger profile.`;
  } else {
    message = `<strong style="color: #e74c3c;">⚠️ Mayday! Critical situation:</strong> Your estimated survival probability is only <strong style="color: #e74c3c;">${surviveProb}%</strong>. This indicates a very low chance of survival based on the model.`;
  }
  
  document.getElementById('predictionMessage').innerHTML = message;
  resultContainer.style.display = 'block';
}
</script>
